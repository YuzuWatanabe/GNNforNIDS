services:
  mtsecurity_service:
    image: mtsecurity_image
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ~/w_yuzu_project/Mtsecurity/Workspace:/workspace
    working_dir: /workspace
    ports:
      - "8889:8888"
    runtime: nvidia
    tty: true
    stdin_open: true
